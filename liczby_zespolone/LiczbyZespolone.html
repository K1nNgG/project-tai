	<h2>Obliczanie liczb zespolonych</h2>
<section id="post">
	<p>Postać: a + bi</p>                                                                                       <!--Informacja o ogólnej postaci liczby zespolonej-->
</section>
<section id="liczby">
<p>                                                                                                             <!--Pierwsza liczba zespolona-->
    a1: <input id="a1" type="number">                                                                          	<!--Część rzeczywista pierwszej liczby-->
    b1: <input id="b1" type="number">                                                                          	<!--Część urojona pierwszej liczby-->
</p>
<p>                                                                                                             <!--Druga liczba zespolona-->
    a2: <input id="a2" type="number">                                                                           <!--Część rzeczywista drugiej liczby-->
    b2: <input id="b2" type="number">                                                                           <!--Część urojona drugiej liczby-->
</p>                                                                                                            
</section>
<section id="przycisk">																							<!--Przyciski wywołujące odpowiednie operacje matematyczne-->
    <button onclick="dodaj()">Dodawanie</button>
    <button onclick="odejmij()">Odejmowanie</button>
    <button onclick="mnoz()">Mnożenie</button>
    <button onclick="podziel()">Dzielenie</button>
</section>
<section id="wyn">
	<p id="wynik"></p>                                                                                          <!--Miejsce wyświetlania wyniku-->
</section>
<script>
function dodaj() {                                                                                              // Dodawanie liczb zespolonych:  (a1 + b1i) + (a2 + b2i) = (a1 + a2) + (b1 + b2)i
    var a1=parseFloat(document.getElementById("a1").value);                                                   	// Pobranie i konwersja wartości z pól input na typ liczbowy (parseFloat)
    var b1=parseFloat(document.getElementById("b1").value);
    var a2=parseFloat(document.getElementById("a2").value);
    var b2=parseFloat(document.getElementById("b2").value);
	
	if (isNaN(a1) || isNaN(b1) || isNaN(a2) || isNaN(b2)) {														// Sprawdzenie czy wszystkie pola zawierają poprawne liczby
        document.getElementById("wynik").innerText="Musisz podać wszystkie liczby";
        return;
    }
                                                                                                                
    document.getElementById("wynik").innerText="Wynik: "+(a1+a2)+" + "+(b1+b2)+"i";                             // Wyświetlenie wyniku w elemencie <p id="wynik">
}

function odejmij() {                                                                                            // Odejmowanie liczb zespolonych: (a1 + b1i) - (a2 + b2i) = (a1 - a2) + (b1 - b2)i
    var a1=parseFloat(document.getElementById("a1").value);
    var b1=parseFloat(document.getElementById("b1").value);
    var a2=parseFloat(document.getElementById("a2").value);
    var b2=parseFloat(document.getElementById("b2").value);
	
	if (isNaN(a1) || isNaN(b1) || isNaN(a2) || isNaN(b2)) {														// Sprawdzenie czy wszystkie pola zawierają poprawne liczby
        document.getElementById("wynik").innerText="Musisz podać wszystkie liczby";
        return;
    }	

    document.getElementById("wynik").innerText="Wynik: "+(a1-a2)+" + "+(b1-b2)+"i";                             // Wyświetlenie wyniku w elemencie <p id="wynik">    
}

function mnoz() {                                                                                               // Mnożenie liczb zespolonych: (a1 + b1i)(a2 + b2i) = a1*a2 - b1*b2 + (a1*b2 + b1*a2)i ponieważ i² = -1
    var a1=parseFloat(document.getElementById("a1").value);
    var b1=parseFloat(document.getElementById("b1").value);
    var a2=parseFloat(document.getElementById("a2").value);
    var b2=parseFloat(document.getElementById("b2").value);
	
	if (isNaN(a1) || isNaN(b1) || isNaN(a2) || isNaN(b2)) {														// Sprawdzenie czy wszystkie pola zawierają poprawne liczby
        document.getElementById("wynik").innerText="Musisz podać wszystkie liczby";
        return;
    }

    var a=a1*a2-b1*b2;                                                                                        	// Część rzeczywista
    var b=a1*b2+b1*a2;                                                                                        	// Część urojona

    document.getElementById("wynik").innerText="Wynik: "+a+" + "+b+"i";                                         // Wyświetlenie wyniku w elemencie <p id="wynik"> 
}

function podziel() {                                                                                            // Dzielenie liczb zespolonych: (a1 + b1i) / (a2 + b2i)  Wzór: [(a1*a2 + b1*b2) + (b1*a2 - a1*b2)i] / (a2² + b2²)
    var a1=parseFloat(document.getElementById("a1").value);
    var b1=parseFloat(document.getElementById("b1").value);
    var a2=parseFloat(document.getElementById("a2").value);
    var b2=parseFloat(document.getElementById("b2").value);
	
	if (isNaN(a1) || isNaN(b1) || isNaN(a2) || isNaN(b2)) {														// Sprawdzenie czy wszystkie pola zawierają poprawne liczby
        document.getElementById("wynik").innerText="Musisz podać wszystkie liczby";
        return;
    }

    var mianownik=a2*a2+b2*b2;                                                                                  // Mianownik (liczba rzeczywista)
    var a=(a1*a2+b1*b2)/mianownik;                                                                              // Część rzeczywista wyniku
    var b=(b1*a2-a1*b2)/mianownik;                                                                              // Część urojona wyniku

    document.getElementById("wynik").innerText ="Wynik: "+a+" + "+b+"i";                                        // Wyświetlenie wyniku w elemencie <p id="wynik">
}
</script>
