<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator rat malejących</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Podkreślenie błędu */
        .error {
            border: 2px solid red;
        }

        /* Chmurka z błędem */
        .tooltip {
            display: none;
            position: absolute;
            background: #f44336;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            z-index: 10;
        }

        .input-container {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>Kalkulator rat malejących</h1>

    <form id="loanForm">
        <div class="input-container">
            <label>Kwota kredytu:</label>
            <input type="text" id="kwota" placeholder="10000 zł" required>
            <button type="button" title="Podaj całkowitą kwotę kredytu, np. 10000">i</button>
            <div class="tooltip" id="kwotaTooltip">Nieprawidłowa wartość!</div>
        </div>
        <br><br>

        <div class="input-container">
            <label>Liczba rat:</label>
            <input type="text" id="raty" placeholder="25" required>
            <button type="button" title="Podaj ile rat miesięcznych chcesz spłacać">i</button>
            <div class="tooltip" id="ratyTooltip">Nieprawidłowa wartość!</div>
        </div>
        <br><br>

        <div class="input-container">
            <label>Oprocentowanie roczne:</label>
            <input type="text" id="oprocentowanie" placeholder="3.4 %" required>
            <button type="button" title="Podaj oprocentowanie roczne w procentach, np. 3.4">i</button>
            <div class="tooltip" id="oprocentowanieTooltip">Nieprawidłowa wartość!</div>
        </div>
        <br><br>

        <button type="submit">Oblicz raty</button>
    </form>

    <div id="wyniki" style="display:none;">
        <h2>Wyniki:</h2>

        <label>Pierwsza rata:
            <input type="text" id="pierwszaRata" readonly>
        </label><br><br>

        <label>Ostatnia rata:
            <input type="text" id="ostatniaRata" readonly>
        </label><br><br>

        <table id="results" border="1">
            <thead>
                <tr>
                    <th>Rata nr</th>
                    <th>Część kapitałowa</th>
                    <th>Część odsetkowa</th>
                    <th>Rata całkowita</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <td colspan="3"><strong>Łącznie do zapłaty:</strong></td>
                    <td id="sumaCalkowita"></td>
                </tr>
            </tfoot>
        </table>

        <br>
        <button id="resetBtn">Licz ponownie</button>
    </div>

    <script>
        const form = document.getElementById('loanForm');
        const wynikiDiv = document.getElementById('wyniki');
        const resultsBody = document.querySelector('#results tbody');
        const sumaCalkowitaCell = document.getElementById('sumaCalkowita');
        const pierwszaRataInput = document.getElementById('pierwszaRata');
        const ostatniaRataInput = document.getElementById('ostatniaRata');
        const resetBtn = document.getElementById('resetBtn');

        const kwotaInput = document.getElementById('kwota');
        const ratyInput = document.getElementById('raty');
        const oprocentowanieInput = document.getElementById('oprocentowanie');

        const kwotaTooltip = document.getElementById('kwotaTooltip');
        const ratyTooltip = document.getElementById('ratyTooltip');
        const oprocentowanieTooltip = document.getElementById('oprocentowanieTooltip');

        function showTooltip(input, tooltip) {
            const rect = input.getBoundingClientRect();
            tooltip.style.top = (input.offsetTop - input.offsetHeight - 5) + 'px';
            tooltip.style.left = input.offsetLeft + 'px';
            tooltip.style.display = 'block';
        }

        function hideTooltip(tooltip) {
            tooltip.style.display = 'none';
        }

        function validateNumber(input, tooltip) {
    // Pobierz wartość i usuń spacje
    let value = input.value.replace(/\s/g, '');

    // Usuń znak zł lub % tylko na potrzeby walidacji
    value = value.replace('zł','').replace('%','');

    // Puste pole = brak błędu
    if (value === '') {
        input.classList.remove('error');
        hideTooltip(tooltip);
        return false;
    }

    // Zamiana przecinka na kropkę
    value = value.replace(',', '.');

    // Wyrażenie regularne: tylko liczby, ewentualnie z kropką dziesiętną
    const regex = /^\d+(\.\d+)?$/;

    if (!regex.test(value) || parseFloat(value) < 0) {
        input.classList.add('error');
        showTooltip(input, tooltip);
        return false;
    } else {
        input.classList.remove('error');
        hideTooltip(tooltip);
        return true;
    }
}



        kwotaInput.addEventListener('input', () => validateNumber(kwotaInput, kwotaTooltip));
        ratyInput.addEventListener('input', () => validateNumber(ratyInput, ratyTooltip));
        oprocentowanieInput.addEventListener('input', () => validateNumber(oprocentowanieInput, oprocentowanieTooltip));

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const kwotaValid = validateNumber(kwotaInput, kwotaTooltip);
            const ratyValid = validateNumber(ratyInput, ratyTooltip);
            const oprocentowanieValid = validateNumber(oprocentowanieInput, oprocentowanieTooltip);

            if (!kwotaValid || !ratyValid || !oprocentowanieValid) {
                alert("Proszę poprawić błędne dane.");
                return;
            }

            const kwota = parseFloat(kwotaInput.value.replace(' zł','').replace(/\s/g,''));
            const raty = parseInt(ratyInput.value.replace(/\s/g,''));
            const oprocentowanie = parseFloat(oprocentowanieInput.value.replace(' %','').replace(/\s/g,'').replace(',', '.'));

            const czescKapitalowa = kwota / raty;
            const miesiecznaStopa = oprocentowanie / 12 / 100;

            resultsBody.innerHTML = '';
            let pozostalyKapital = kwota;
            let sumaCalkowita = 0;
            let pierwszaRata = 0;
            let ostatniaRata = 0;

            for (let i = 1; i <= raty; i++) {
                const czescOdsetkowa = pozostalyKapital * miesiecznaStopa;
                const rataCalkowita = czescKapitalowa + czescOdsetkowa;

                if (i === 1) pierwszaRata = rataCalkowita;
                if (i === raty) ostatniaRata = rataCalkowita;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td>${czescKapitalowa.toFixed(2)} zł</td>
                    <td>${czescOdsetkowa.toFixed(2)} zł</td>
                    <td>${rataCalkowita.toFixed(2)} zł</td>
                `;
                resultsBody.appendChild(row);

                sumaCalkowita += rataCalkowita;
                pozostalyKapital -= czescKapitalowa;
            }

            pierwszaRataInput.value = pierwszaRata.toFixed(2) + " zł";
            ostatniaRataInput.value = ostatniaRata.toFixed(2) + " zł";
            sumaCalkowitaCell.textContent = sumaCalkowita.toFixed(2) + " zł";

            wynikiDiv.style.display = 'block';
        });

        resetBtn.addEventListener('click', function() {
            resultsBody.innerHTML = '';
            sumaCalkowitaCell.textContent = '';
            pierwszaRataInput.value = '';
            ostatniaRataInput.value = '';
            form.reset();
            wynikiDiv.style.display = 'none';
            kwotaInput.classList.remove('error');
            ratyInput.classList.remove('error');
            oprocentowanieInput.classList.remove('error');
            hideTooltip(kwotaTooltip);
            hideTooltip(ratyTooltip);
            hideTooltip(oprocentowanieTooltip);
        });
    </script>

</body>
</html>
